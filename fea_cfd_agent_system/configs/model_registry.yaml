# Complete model registry — ALL known models for FEA/CFD ML
# Agent reads this and scores every model before selecting

models:

  - name: "FNO"
    family: "neural_operator"
    github_url: "https://github.com/neuraloperator/neuraloperator"
    install_cmd: "pip install neuraloperator"
