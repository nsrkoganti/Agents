# Base configuration for FEA Surrogate ML Agent System

system:
  name: "FEA_Surrogate_ML_Agent_System"
  version: "2.0.0"
  device: "cuda"
  seed: 42
  log_level: "INFO"

# LLM configuration
# Dev LLM: Gemini 2.5 Flash (free: 15 RPM / 1500 RPD) → Claude Sonnet 4.6 fallback
# Verifier LLM: Claude Opus 4.7 (always Anthropic direct)
llm:
  dev_provider: "gemini"
  dev_model: "gemini-2.5-flash"
  verifier_provider: "anthropic"
  verifier_model: "claude-opus-4-7"
  fallback_model: "claude-sonnet-4-6"

# Accuracy thresholds — model cannot be saved unless these are met
evaluation:
  thresholds:
    r2_min: 0.92
    rel_l2_max: 0.05
    max_point_error_max: 0.15
    bc_error_max: 1.0e-6
    inference_time_ms_max: 100.0

# Iteration control
iteration:
  max_attempts_per_model: 3
  max_models_to_try: 8
  total_max_attempts: 24

# Physics agent thresholds (FEA only)
physics:
  fea:
    static_linear:
      r2_min: 0.95
      rel_l2_max: 0.03
      equilibrium_residual_max: 1.0e-5
      stress_error_max: 0.02
      strain_energy_error_max: 0.01
      compatibility_threshold: 1.0e-7
      symmetry_threshold: 1.0e-8
    static_nonlinear:
      r2_min: 0.93
      rel_l2_max: 0.05
      equilibrium_residual_max: 1.0e-4
      compatibility_threshold: 1.0e-6
    dynamic:
      r2_min: 0.90
      rel_l2_max: 0.08
      modal_assurance_criterion_min: 0.90
      compatibility_threshold: 1.0e-6
    thermal:
      r2_min: 0.95
      rel_l2_max: 0.03
      energy_balance_error_max: 0.001
    thermal_structural:
      r2_min: 0.92
      rel_l2_max: 0.04

# Training defaults
training:
  max_epochs: 2000
  early_stopping_patience: 20
  gradient_clip_max_norm: 1.0
  default_lr: 1.0e-3

# Physics loss lambda weights (soft penalty method)
physics_lambda_weights:
  equilibrium: 1.0
  bc: 2.0
  compatibility: 1.0
  constitutive: 1.0
  symmetry: 1.0

# Lambda multipliers when physics check fails
lambda_multipliers:
  equilibrium: 2.0
  bc: 5.0
  symmetry: 2.0
  compatibility: 2.0
  constitutive: 2.0

# Model selector score weights per physics type
selector:
  score_weights:
    FEA_static_linear:
      physics_fit: 0.25
      mesh_fit: 0.20
      data_efficiency: 0.15
      accuracy: 0.15
      physics_law: 0.10
      speed: 0.05
      code_maturity: 0.05
      compute: 0.05
    FEA_static_nonlinear:
      physics_fit: 0.28
      mesh_fit: 0.20
      data_efficiency: 0.12
      accuracy: 0.15
      physics_law: 0.12
      speed: 0.05
      code_maturity: 0.05
      compute: 0.03
    FEA_dynamic:
      physics_fit: 0.25
      mesh_fit: 0.18
      data_efficiency: 0.12
      accuracy: 0.15
      physics_law: 0.15
      speed: 0.08
      code_maturity: 0.05
      compute: 0.02
    thermal:
      physics_fit: 0.25
      mesh_fit: 0.20
      data_efficiency: 0.15
      accuracy: 0.15
      physics_law: 0.10
      speed: 0.07
      code_maturity: 0.05
      compute: 0.03
